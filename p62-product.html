<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="images/pen-nib-solid.svg" type="">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDscion-p62 — Full Sleeve Quarter Button A-Line Dress</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .monogram img {
            filter: invert(1) sepia(1) hue-rotate(310deg) saturate(8) brightness(0.35) contrast(1.5);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Gallery iframe background ── */
        .bg-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Dark blur overlay between gallery and content ── */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.52);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Breadcrumb ── */
        .product-breadcrumb {
            font-family: "Times New Roman", Times, serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 1rem;
        }
        .product-breadcrumb a {
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            transition: color 0.2s;
        }
        .product-breadcrumb a:hover { color: rgba(255,255,255,0.9); }
        .product-breadcrumb span { margin: 0 1rem; }

        /* ── Page layout ── */
        .product-page-wrap {
            position: relative;
            z-index: 2;
            flex: 1;
            min-height: 0;
            padding: 1.6rem 4rem 1.6rem;
            display: flex;
            flex-direction: column;
        }

        .product-title-row {
            margin-bottom: 1.4rem;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .product-title-row h2 {
            font-family: "Times New Roman", Times, serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.92);
            margin: 0 0 0.4rem 0;
        }
        .product-title-row p {
            font-family: "Times New Roman", Times, serif;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(180,160,200,0.85);
            margin: 0;
        }
        .product-home-link {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .product-home-link:hover { color: rgba(255,255,255,0.9); }

        /* ── Main split layout ── */
        .product-split {
            display: flex;
            gap: 2.4rem;
            flex: 1;
            min-height: 0;
        }

        /* ── 3D Viewer panel ── */
        .viewer-panel {
            position: relative;
            flex: 1.4;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            min-height: 0;
            box-shadow: 0 8px 48px rgba(0,0,0,0.35);
        }
        #viewer-canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 4px;
        }
        .viewer-label {
            position: absolute;
            bottom: 1.8rem;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-family: "Times New Roman", serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* ── Fabric column (tagline + panel) ── */
        .fabric-col {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* ── Fabric panel ── */
        .fabric-panel {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 2rem 1.8rem 1.6rem;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow-y: auto;
            box-shadow: 0 8px 48px rgba(0,0,0,0.35);
        }
        .product-tagline {
            font-family: "Times New Roman", serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            text-align: right;
            margin: 0 0 0.8rem 0;
            flex-shrink: 0;
        }
        .fabric-panel-title {
            font-family: "Times New Roman", serif;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            margin: 0 0 2rem 0;
            text-align: center;
        }

        /* ── Fabric category accordion ── */
        .fabric-group {
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        .fabric-group-btn {
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 0;
            font-family: "Times New Roman", serif;
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
            transition: color 0.2s;
        }
        .fabric-group-btn:hover { color: rgba(255,255,255,0.9); }
        .fabric-group-btn.open { color: #ffffff; }
        .fabric-group-btn .chevron {
            font-size: 0.7rem;
            transition: transform 0.25s ease;
            opacity: 0.45;
        }
        .fabric-group-btn.open .chevron { transform: rotate(180deg); opacity: 1; }
        .fabric-swatches {
            display: none;
            flex-direction: column;
            gap: 0.8rem;
            padding-bottom: 1.2rem;
        }
        .fabric-swatches.open { display: flex; }

        /* ── Individual fabric swatch ── */
        .fabric-item {
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 3px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }
        .fabric-item:hover {
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.02);
        }
        .fabric-item.active {
            border-color: #ffffff;
        }
        .fabric-item img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
        }
        .fabric-item p {
            margin: 0;
            padding: 0.6rem 0.8rem;
            font-family: "Times New Roman", serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.25);
            text-align: center;
        }
        .fabric-item.active p {
            color: #fff;
            background: rgba(0,0,0,0.45);
        }

    </style>
</head>
<body>

    <!-- ── Pool of Designs gallery as background ── -->
    <iframe class="bg-frame" src="poolofdesigns-claude.html" tabindex="-1" aria-hidden="true"></iframe>
    <div class="bg-overlay"></div>

    <div class="product-page-wrap">

        <div class="product-breadcrumb">
            <a href="index.html">King Dhorajiya</a>
        </div>

        <div class="product-title-row">
            <div>
                <h2>Full Sleeve Quarter Button A-Line Dress</h2>
                <p><a href="poolofdesigns-claude.html" class="product-home-link">Pool of Designs</a> &nbsp;·&nbsp; KDscion-p62 &nbsp;·&nbsp; The House of Scion</p>
            </div>
            <p class="product-tagline">Custom &nbsp;|&nbsp; Premium &nbsp;|&nbsp; Unique</p>
        </div>

        <!-- ── Main split: 3D viewer + Fabric panel ── -->
        <div class="product-split">

            <!-- Left: 3D canvas -->
            <div class="viewer-panel">
                <canvas id="viewer-canvas"></canvas>
                <p class="viewer-label">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</p>
            </div>

            <!-- Right: fabric panel -->
            <div class="fabric-col">
                <div class="fabric-panel">
                <p class="fabric-panel-title">Select Fabric</p>

                <!-- COTTON -->
                <div class="fabric-group">
                    <button class="fabric-group-btn" data-group="cotton">
                        Cotton <span class="chevron">▼</span>
                    </button>
                    <div class="fabric-swatches" id="group-cotton">
                        <div class="fabric-item" data-texture="images/cotton-1.jpg">
                            <img src="images/cotton-1.jpg" alt="Cotton 1">
                            <p>Cotton 1</p>
                        </div>
                        <div class="fabric-item" data-texture="images/cotton-2.jpg">
                            <img src="images/cotton-2.jpg" alt="Cotton 2">
                            <p>Cotton 2</p>
                        </div>
                    </div>
                </div>

                <!-- LINEN -->
                <div class="fabric-group">
                    <button class="fabric-group-btn" data-group="linen">
                        Linen <span class="chevron">▼</span>
                    </button>
                    <div class="fabric-swatches" id="group-linen">
                        <div class="fabric-item" data-texture="images/linen-1.jpg">
                            <img src="images/linen-1.jpg" alt="Linen 1">
                            <p>Linen 1</p>
                        </div>
                        <div class="fabric-item" data-texture="images/linen-2.webp">
                            <img src="images/linen-2.webp" alt="Linen 2">
                            <p>Linen 2</p>
                        </div>
                    </div>
                </div>

                <!-- COTTON-LINEN BLEND -->
                <div class="fabric-group">
                    <button class="fabric-group-btn" data-group="cotton-linen">
                        Cotton-Linen Blend <span class="chevron">▼</span>
                    </button>
                    <div class="fabric-swatches" id="group-cotton-linen">
                        <div class="fabric-item" data-texture="images/cotton-linen blend-1.webp">
                            <img src="images/cotton-linen blend-1.webp" alt="Cotton-Linen Blend 1">
                            <p>Cotton-Linen Blend 1</p>
                        </div>
                        <div class="fabric-item" data-texture="images/cotton-linen blend-2.jpg">
                            <img src="images/cotton-linen blend-2.jpg" alt="Cotton-Linen Blend 2">
                            <p>Cotton-Linen Blend 2</p>
                        </div>
                    </div>
                </div>

                <!-- WOOL -->
                <div class="fabric-group">
                    <button class="fabric-group-btn" data-group="wool">
                        Wool <span class="chevron">▼</span>
                    </button>
                    <div class="fabric-swatches" id="group-wool">
                        <div class="fabric-item" data-texture="images/wool-1.jpg">
                            <img src="images/wool-1.jpg" alt="Wool 1">
                            <p>Wool 1</p>
                        </div>
                    </div>
                </div>

                <!-- WOOL BLEND -->
                <div class="fabric-group">
                    <button class="fabric-group-btn" data-group="wool-blend">
                        Wool Blend <span class="chevron">▼</span>
                    </button>
                    <div class="fabric-swatches" id="group-wool-blend">
                        <div class="fabric-item" data-texture="images/wool-blend-2.avif">
                            <img src="images/wool-blend-2.avif" alt="Wool Blend 2">
                            <p>Wool Blend 2</p>
                        </div>
                    </div>
                </div>

                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.169.0';
        import { GLTFLoader }    from 'https://esm.sh/three@0.169.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://esm.sh/three@0.169.0/examples/jsm/controls/OrbitControls.js';

        const canvas = document.getElementById('viewer-canvas');
        let rendererS, sceneS, cameraS, controlsS, animIdS, currentModel;

        function initViewer() {
            const W = canvas.clientWidth  || 800;
            const H = canvas.clientHeight || 700;
            rendererS = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            rendererS.setPixelRatio(Math.min(window.devicePixelRatio * 2, 4));
            rendererS.setSize(W, H);
            rendererS.outputColorSpace = THREE.SRGBColorSpace;

            sceneS  = new THREE.Scene();
            cameraS = new THREE.PerspectiveCamera(45, W / H, 0.01, 1000);
            cameraS.position.set(0, 1, 3);

            sceneS.add(new THREE.AmbientLight(0xffffff, 1.8));
            const key = new THREE.DirectionalLight(0xffffff, 1.4);
            key.position.set(5, 8, 5); sceneS.add(key);
            const fill = new THREE.DirectionalLight(0xffffff, 0.8);
            fill.position.set(-5, 2, -5); sceneS.add(fill);
            const back = new THREE.DirectionalLight(0xffffff, 0.5);
            back.position.set(0, 4, -8); sceneS.add(back);

            controlsS = new OrbitControls(cameraS, rendererS.domElement);
            controlsS.enableDamping = true;
            controlsS.dampingFactor = 0.08;
            controlsS.autoRotate = true;
            controlsS.autoRotateSpeed = 1.2;

            new GLTFLoader().load('3d/p62-full sleeve quarter button A-line dress.glb', (gltf) => {
                currentModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(currentModel);
                currentModel.position.sub(box.getCenter(new THREE.Vector3()));
                currentModel.scale.setScalar(2.2 / box.getSize(new THREE.Vector3()).length());
                sceneS.add(currentModel);
                currentModel.traverse((node) => {
                    if (node.isMesh) console.log('[mesh]', node.name);
                });
            }, undefined, (err) => console.error(err));

            (function animate() {
                animIdS = requestAnimationFrame(animate);
                controlsS.update();
                rendererS.render(sceneS, cameraS);
            })();
        }

        /* ── Keywords that identify body/avatar/shoe meshes to skip ── */
        const BODY_KEYWORDS = ['body', 'skin', 'avatar', 'head', 'face', 'hair',
                               'hand', 'feet', 'foot', 'leg', 'arm', 'eye',
                               'teeth', 'tooth', 'tongue', 'neck', 'torso', 'human',
                               'shoe', 'boot', 'heel', 'sole', 'footwear', 'sandal'];

        function isBodyMesh(node) {
            const name = (node.name || '').toLowerCase();
            return BODY_KEYWORDS.some(kw => name.includes(kw));
        }

        /* ── Apply fabric using normalised CLO3D UV coordinates ──
           CLO3D exports UV in mm units with negative values (e.g. -267 to 251).
           We measure global min/max across all cloth pieces, remap every UV to
           0–1 (preserving relative piece layout), then apply with a fixed repeat
           so the texture tiles a visible number of times across the garment.   ── */
        const texLoader = new THREE.TextureLoader();
        let uvNormCache = null;
        let origGeometries = new Map();

        function initFabricData() {
            if (uvNormCache) return;
            let gMinU = Infinity, gMaxU = -Infinity, gMinV = Infinity, gMaxV = -Infinity;
            currentModel.traverse((node) => {
                if (!node.isMesh || isBodyMesh(node)) return;
                if (!origGeometries.has(node.uuid)) {
                    origGeometries.set(node.uuid, node.geometry.clone());
                }
                const uv = node.geometry.attributes.uv;
                if (!uv) return;
                for (let i = 0; i < uv.count; i++) {
                    const u = uv.getX(i), v = uv.getY(i);
                    if (u < gMinU) gMinU = u; if (u > gMaxU) gMaxU = u;
                    if (v < gMinV) gMinV = v; if (v > gMaxV) gMaxV = v;
                }
            });
            const gScale = Math.max(gMaxU - gMinU, gMaxV - gMinV) || 1;
            uvNormCache = { gMinU, gMinV, gScale };
        }

        function applyFabric(texturePath) {
            texLoader.load(texturePath, (tex) => {
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(1, 1);
                tex.anisotropy = rendererS.capabilities.getMaxAnisotropy();
                tex.needsUpdate = true;
                if (!currentModel) return;

                initFabricData();
                const { gMinU, gMinV, gScale } = uvNormCache;

                currentModel.traverse((node) => {
                    if (!node.isMesh || isBodyMesh(node)) return;
                    const orig = origGeometries.get(node.uuid);
                    if (!orig) return;
                    const geo = orig.clone();
                    const uv  = geo.attributes.uv;
                    if (uv) {
                        for (let i = 0; i < uv.count; i++) {
                            uv.setXY(i,
                                (uv.getX(i) - gMinU) / gScale,
                                (uv.getY(i) - gMinV) / gScale
                            );
                        }
                        uv.needsUpdate = true;
                    }
                    node.geometry = geo;
                    const t = tex.clone();
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                    t.needsUpdate = true;
                    node.material = new THREE.MeshBasicMaterial({
                        map: t,
                        side: THREE.DoubleSide,
                    });
                });
                console.log('[fabric] applied:', texturePath);
            }, undefined, (err) => console.error('[fabric] LOAD ERROR:', texturePath, err));
        }

        /* ── Accordion: category buttons ── */
        document.querySelectorAll('.fabric-group-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const isOpen = btn.classList.contains('open');
                // close all
                document.querySelectorAll('.fabric-group-btn').forEach(b => b.classList.remove('open'));
                document.querySelectorAll('.fabric-swatches').forEach(s => s.classList.remove('open'));
                // open clicked one if it was closed
                if (!isOpen) {
                    btn.classList.add('open');
                    document.getElementById('group-' + btn.dataset.group).classList.add('open');
                }
            });
        });

        /* ── Fabric click handlers ── */
        document.querySelectorAll('.fabric-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.fabric-item').forEach(f => f.classList.remove('active'));
                item.classList.add('active');
                applyFabric(item.dataset.texture);
            });
        });

        /* ── Start viewer on page load ── */
        requestAnimationFrame(initViewer);

        /* ── Resize handling ── */
        window.addEventListener('resize', () => {
            if (!rendererS) return;
            const W = canvas.clientWidth;
            const H = canvas.clientHeight;
            cameraS.aspect = W / H;
            cameraS.updateProjectionMatrix();
            rendererS.setSize(W, H);
        });
    </script>

</body>
</html>
