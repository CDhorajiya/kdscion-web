<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="images/pen-nib-solid.svg" type="">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — King Dhorajiya</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      min-height: 100%;
      background: #0a080f;
      color: rgba(255,255,255,0.85);
    }
    .monogram img {
      filter: invert(1) sepia(1) hue-rotate(90deg) saturate(8) brightness(0.22) contrast(1.5);
    }

    .orders-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 3rem 6rem;
    }
    .orders-title {
      font-family: "Times New Roman", serif;
      font-size: 1.4rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin: 0 0 3.2rem;
      font-weight: 400;
    }

    /* ── Empty / loading ── */
    .orders-empty {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 4rem 0;
      text-transform: uppercase;
    }

    /* ── Order card ── */
    .order-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-bottom: 1.6rem;
      overflow: hidden;
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .order-header__left {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .order-id {
      font-family: "Times New Roman", serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }
    .order-date {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
    }
    .order-header__right {
      display: flex;
      align-items: center;
      gap: 1.6rem;
    }
    .order-total {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.8);
    }

    /* ── Status badge ── */
    .order-status {
      font-family: "Times New Roman", serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .status-confirmed, .status-delivered {
      color: rgba(160,220,160,0.9);
      border-color: rgba(160,220,160,0.3);
      background: rgba(160,220,160,0.06);
    }
    .status-payment_pending, .status-pending {
      color: rgba(220,200,120,0.9);
      border-color: rgba(220,200,120,0.3);
      background: rgba(220,200,120,0.06);
    }
    .status-in_production {
      color: rgba(120,180,220,0.9);
      border-color: rgba(120,180,220,0.3);
      background: rgba(120,180,220,0.06);
    }
    .status-shipped {
      color: rgba(180,140,220,0.9);
      border-color: rgba(180,140,220,0.3);
      background: rgba(180,140,220,0.06);
    }
    .status-cancelled {
      color: rgba(220,120,120,0.9);
      border-color: rgba(220,120,120,0.3);
      background: rgba(220,120,120,0.06);
    }
    .status-refunded {
      color: rgba(220,160,100,0.9);
      border-color: rgba(220,160,100,0.3);
      background: rgba(220,160,100,0.06);
    }

    /* ── Order items ── */
    .order-items {
      padding: 0.4rem 2rem 1.4rem;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 1rem;
    }
    .order-item:last-child { border-bottom: none; }
    .order-item__name {
      font-family: "Times New Roman", serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
    }
    .order-item__qty {
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      margin-top: 0.2rem;
    }
    .order-item__price {
      font-family: "Times New Roman", serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }

    /* ── Continue shopping link ── */
    .orders-cta {
      text-align: center;
      margin-top: 3rem;
    }
    .orders-cta a {
      display: inline-block;
      padding: 1rem 3rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: border-color .2s, color .2s;
    }
    .orders-cta a:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav collapsible">
      <a href="index.html" class="brand-name"><h1>KING DHORAJIYA</h1></a>
      <svg class="icon icon--white nav__toggler">
        <use xlink:href="images/sprite.svg#menu"></use>
      </svg>
      <a class="bb" href="#"><img src="images/Drawing.svg" alt="Bespoke Boutique link"></a>
    </nav>
  </header>

  <div class="orders-wrap">
    <h2 class="orders-title">My Orders</h2>
    <div id="orders-list">
      <p class="orders-empty">Loading…</p>
    </div>
    <div class="orders-cta">
      <a href="poolofdesigns-productdescription-claude.html">Continue Shopping</a>
    </div>
  </div>

  <div class="footer">
    <div class="footer_details">
      <a href="foundermessage.html"><h5>About House</h5></a>
      <a href="contacthouse.html"><h5>Contact House</h5></a>
      <a href=""><h5>Career</h5></a>
      <a href="checkout.html"><h5>Checkout</h5></a>
    </div>
    <div class="footer_branding">
      <div class="monogram">
        <a href="index.html">
          <img src="/images/KD_monogram.png" alt="KD monogram home page link">
        </a>
      </div>
      <p>Copyright 2024 KING DHORAJIYA</p>
    </div>
  </div>

  <script type="module">
    import { getOrders, isLoggedIn } from './js/api.js';
    import { openAuthModal } from './js/auth-modal.js';

    if (!isLoggedIn()) {
      openAuthModal(() => window.location.reload());
    }

    const STATUS_LABEL = {
      pending:         'Pending',
      payment_pending: 'Awaiting Payment',
      confirmed:       'Confirmed',
      in_production:   'In Production',
      shipped:         'Shipped',
      delivered:       'Delivered',
      cancelled:       'Cancelled',
      refunded:        'Refunded',
    };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric',
      });
    }

    function shortId(id) {
      return id.slice(0, 8).toUpperCase();
    }

    async function renderOrders() {
      const container = document.getElementById('orders-list');
      try {
        const result = await getOrders();
        const orders = Array.isArray(result) ? result[0] : (result.data ?? result);

        if (!orders.length) {
          container.innerHTML = `<p class="orders-empty">No orders yet.</p>`;
          return;
        }

        container.innerHTML = orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <div class="order-header__left">
                <span class="order-id">Order #${shortId(order.id)}</span>
                <span class="order-date">${formatDate(order.createdAt)}</span>
              </div>
              <div class="order-header__right">
                <span class="order-total">$${Number(order.totalAmount).toLocaleString()}</span>
                <span class="order-status status-${order.status}">
                  ${STATUS_LABEL[order.status] ?? order.status}
                </span>
              </div>
            </div>
            <div class="order-items">
              ${(order.items ?? []).map(item => `
                <div class="order-item">
                  <div>
                    <p class="order-item__name">${item.productName}</p>
                    <p class="order-item__qty">Qty ${item.quantity}</p>
                  </div>
                  <span class="order-item__price">$${(Number(item.unitPrice) * item.quantity).toLocaleString()}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = `<p class="orders-empty">Could not load orders.</p>`;
      }
    }

    renderOrders();
  </script>

</body>
</html>
