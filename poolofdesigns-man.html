<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="images/KD_monogram.png" type="">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool of Designs — Men</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .monogram img {
            filter: invert(1) sepia(1) hue-rotate(90deg) saturate(8) brightness(0.22) contrast(1.5);
        }

        /* ── Product gallery ── */
        .product-gallery {
            display: flex;
            gap: 8rem;
            margin-top: 0;
        }

        /* ── Each product column ── */
        .product-column {
            display: flex;
            flex-direction: column;
            gap: 8rem;
            flex: 1;
        }

        /* ── Each product card ── */
        .product-item {
            position: relative;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.4s ease;
        }
        .product-item:hover {
            transform: scale(1.05);
        }
        .product-item img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Pointer annotation ── */
        .product-desc {
            position: absolute;
            top: 50%;
            left: calc(100% - 20px);
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease;
            z-index: 300;
        }
        .product-column:last-child .product-desc {
            left: auto;
            right: calc(100% - 20px);
            align-items: flex-end;
            padding-left: 0;
            padding-right: 14px;
        }
        .product-desc::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(40,25,5,0.8);
            box-shadow: 0 0 4px rgba(40,25,5,0.4);
        }
        .product-column:last-child .product-desc::before {
            left: auto;
            right: 0;
        }
        .product-desc::after { display: none; }
        .product-item.popup-active .product-desc { opacity: 1; }
        .product-desc__title {
            font-family: "Times New Roman", Times, serif;
            font-size: 1.45rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(30,20,5,0.9);
            margin: 0;
            white-space: nowrap;
        }
        .product-desc__divider { display: none; }
        .product-desc__sub {
            display: block;
            font-family: "Times New Roman", Times, serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: rgba(30,20,5,0.7);
            text-transform: uppercase;
            margin: 0.5rem 0 0 0;
            white-space: normal;
            max-width: 160px;
        }
        .product-column:last-child .product-desc__title,
        .product-column:last-child .product-desc__sub { text-align: right; }
    </style>
</head>
<body>

    <header>
        <nav class="nav collapsible">
            <a href="index.html" class="brand-name"><h1>KING DHORAJIYA</h1></a>
            <svg class="icon icon--white nav__toggler">
                <use xlink:href="images/sprite.svg#menu"></use>
            </svg>
            <a class="bb" href="bespokeboutique.html"><img src="images/Drawing.svg" alt="Bespoke Boutique link"></a>
        </nav>
    </header>

    <div class="container-snaps">
        <h3 class="title">POOL OF DESIGNS</h3>

        <div class="product-gallery snap-gallery">

            <!-- ── Column 1 ── -->
            <div class="product-column column column1">

                <div class="product-item has-3d"
                     data-model="3d/p279&p280 full sleeve classic shirt & classic trouser.glb"
                     data-product-url="p279&p280-product.html">
                    <img src="images/p279&p280-full sleeve classic shirt and classic trouser_Colorway A (1).webp"
                         alt="KDscion-p279&p280 full sleeve classic shirt and classic trouser">
                    <div class="product-desc">
                        <p class="product-desc__title">KDscion-p279&p280 full sleeve classic shirt and classic trouser</p>
                        <div class="product-desc__divider"></div>
                        <p class="product-desc__sub">King Dhorajiya</p>
                    </div>
                </div>

            </div>

            <!-- ── Column 2 ── -->
            <div class="product-column column column2"></div>

            <!-- ── Column 3 ── -->
            <div class="product-column column column3"></div>

        </div>
    </div>

    <div class="footer">
        <div class="footer_details">
            <a href="foundermessage.html"><h5>About House</h5></a>
            <a href="contacthouse.html"><h5>Contact House</h5></a>
            <a href=""><h5>Career</h5></a>
            <a href=""><h5>Account</h5></a>
        </div>
        <div class="footer_branding">
            <div class="monogram">
                <a href="index.html">
                    <img src="/images/KD_monogram.png" alt="KD monogram home page link">
                </a>
            </div>
            <p>Copyright 2024 KING DHORAJIYA</p>
        </div>
    </div>

    <!-- ── Navigate to product page on click ── -->
    <script>
        document.querySelectorAll('.product-item[data-model]').forEach(item => {
            item.addEventListener('click', () => {
                const url = item.dataset.productUrl;
                if (url) {
                    window.location.href = url;
                } else {
                    const match = item.dataset.model.match(/p(\d+)-/);
                    if (match) window.location.href = 'p' + match[1] + '-product.html';
                }
            });
        });
    </script>

    <script>
        const items = document.querySelectorAll('.product-item');

        items.forEach(item => {
            const titleEl = item.querySelector('.product-desc__title');
            const subEl   = item.querySelector('.product-desc__sub');
            if (titleEl && subEl) {
                const full  = titleEl.textContent.trim();
                const idx   = full.indexOf('-');
                if (idx !== -1) {
                    const brand = full.slice(0, idx);
                    titleEl.textContent = brand.startsWith('KD') ? 'KD ' + brand.slice(2) : brand;
                    subEl.textContent   = full.slice(idx + 1);
                }
            }
        });

        requestAnimationFrame(() => {
            items.forEach(item => {
                const titleEl   = item.querySelector('.product-desc__title');
                const dividerEl = item.querySelector('.product-desc__divider');
                if (titleEl && dividerEl) dividerEl.style.width = titleEl.offsetWidth + 'px';
            });
        });

        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                items.forEach(el => el.classList.remove('popup-active'));
                item.classList.add('popup-active');
            });
            item.addEventListener('mouseleave', () => {
                item.classList.remove('popup-active');
            });
        });
    </script>

</body>
</html>
