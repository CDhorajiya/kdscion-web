<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garment Passport — King Dhorajiya</title>
  <link rel="icon" href="images/KD_monogram.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon:  #800000;
      --green:   #1a4a1a;
      --accent:  #800000;
      --bg:      #ffffff;
      --surface: #faf9f7;
      --border:  rgba(128,0,0,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #1a1a1a;
      font-family: 'Cormorant Garamond', serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.6rem;
      background: var(--bg); z-index: 100;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .load-mono {
      font-size: 2.2rem; letter-spacing: 6px;
      color: var(--maroon); font-weight: 300;
    }
    .load-bar {
      width: 160px; height: 1px; background: rgba(128,0,0,0.15);
      overflow: hidden;
    }
    .load-bar::after {
      content: '';
      display: block; height: 100%;
      width: 40%; background: var(--maroon);
      animation: load-sweep 1.4s ease-in-out infinite;
    }
    @keyframes load-sweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Main layout ── */
    .passport-wrap {
      display: grid;
      grid-template-columns: 1fr 420px;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
    }
    .passport-wrap.visible { opacity: 1; }

    /* ── Left: 3D viewer ── */
    .viewer-side {
      position: relative;
      background: #f4f3f0;
      border-right: 1px solid rgba(128,0,0,0.12);
    }
    #viewer-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    /* ── Wreath column (right edge of viewer) ── */
    .wreath-col {
      position: absolute;
      top: 0; right: 1.2rem;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      z-index: 10;
      pointer-events: none;
    }
    .wreath-col img {
      width: 120px; height: 120px;
      object-fit: contain;
    }
    .wreath-col img.spinning {
      animation: passport-spin 18s linear infinite;
    }

    .viewer-hint {
      position: absolute; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: 1rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(128,0,0,0.35);
      pointer-events: none;
      animation: hint-fade 3s ease 3s forwards;
    }
    @keyframes hint-fade { to { opacity: 0; } }

    /* ── Right: passport details ── */
    .details-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.8rem 3rem;
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    /* Top header */
    .passport-header {
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid rgba(128,0,0,0.15);
      gap: 0.8rem;
      flex-shrink: 0;
    }
    .kd-seal {
      width: 150px; height: 150px;
    }
    .kd-seal img {
      width: 100%; height: 100%;
      object-fit: contain;
      animation: passport-spin 18s linear infinite;
    }
    @keyframes passport-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .house-bespoke {
      font-size: 1rem; letter-spacing: 10px;
      text-transform: uppercase; color: var(--maroon);
      font-weight: 300;
    }

    /* Certificate title */
    .cert-title {
      font-size: 1rem; letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(26,74,26,0.5);
      margin-bottom: 0.6rem;
    }
    .garment-name {
      font-size: 2.6rem; font-weight: 300;
      color: #1a1a1a;
      line-height: 1.15;
      margin-bottom: 2.8rem;
    }

    /* Data rows */
    .data-grid {
      display: flex; flex-direction: column; gap: 1.6rem;
      flex: 1;
    }
    .data-row {
      display: flex; flex-direction: column; gap: 0.3rem;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .data-row:last-child { border-bottom: none; }
    .data-label {
      font-size: 0.88rem; letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.7;
    }
    .data-value {
      font-size: 1.5rem; letter-spacing: 2px;
      color: #1a1a1a; font-weight: 300;
    }
    .data-value.passport-num {
      font-family: 'Courier New', monospace;
      font-size: 1.3rem; letter-spacing: 4px;
      color: var(--maroon);
    }
    .data-value.edition {
      display: flex; align-items: baseline; gap: 0.5rem;
    }
    .edition-num {
      font-size: 2.4rem; color: var(--maroon);
    }
    .edition-label {
      font-size: 1rem; letter-spacing: 2px;
      color: rgba(128,0,0,0.45);
    }

    /* Authenticated seal */
    .auth-seal {
      margin-top: 2.4rem;
      padding: 1.6rem;
      border: 1px solid rgba(26,74,26,0.25);
      border-radius: 2px;
      display: flex; align-items: center; gap: 1.2rem;
      background: rgba(26,74,26,0.04);
    }
    .seal-icon {
      font-size: 2rem; color: var(--green); flex-shrink: 0;
    }
    .seal-text-main {
      font-size: 1rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--green);
    }
    .seal-text-sub {
      font-size: 0.85rem; letter-spacing: 2px;
      color: rgba(26,74,26,0.55); margin-top: 0.2rem;
    }

    /* ── Envelope stage (between header and footer) ── */
    .envelope-stage {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .envelope-stage.hiding {
      opacity: 0; transform: scale(0.92); pointer-events: none;
    }

    /* Envelope shape */
    .envelope {
      position: relative;
      width: 100%; max-width: 300px;
      height: 200px;
      cursor: pointer;
      perspective: 900px;
    }

    /* Envelope body (the lower rectangle) */
    .envelope-body {
      position: absolute;
      inset: 0;
      background: #fff;
      border: 1px solid rgba(128,0,0,0.18);
      box-shadow: 0 6px 32px rgba(0,0,0,0.08);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 1.6rem;
    }
    .envelope-body p {
      font-size: 0.82rem; letter-spacing: 5px;
      text-transform: uppercase; color: rgba(128,0,0,0.3);
    }

    /* Bottom triangle fold lines (decorative V on the body) */
    .envelope-body::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(135deg, #f5f3f0 50%, transparent 50%),
                  linear-gradient(225deg, #f5f3f0 50%, transparent 50%);
      background-size: 50% 100%;
      background-position: left, right;
      background-repeat: no-repeat;
      opacity: 0.5;
    }

    /* Flap — triangular, sits on top of the envelope body */
    .envelope-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
      background: #f8f6f2;
      border-left: 1px solid rgba(128,0,0,0.18);
      border-right: 1px solid rgba(128,0,0,0.18);
      transform-origin: 50% 0%;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
    }
    .envelope.open .envelope-flap {
      transform: rotateX(-195deg);
    }

    /* Bouquet seal — on the ENVELOPE itself (not inside the clipped flap)
       so it is never cut off. Positioned at the flap tip (55% down). */
    .bouquet-seal {
      position: absolute;
      top: calc(55% - 36px);   /* centred on the flap tip */
      left: 50%;
      transform: translateX(-50%);
      width: 72px; height: 72px;
      z-index: 10;              /* above flap and body */
      pointer-events: none;
    }
    .bouquet-seal .seal-wreath {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .bouquet-seal .seal-mono {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 30px; height: 30px;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(13%) sepia(80%)
              saturate(500%) hue-rotate(320deg) brightness(0.5);
    }

    /* Open hint */
    .envelope-hint {
      font-size: 0.82rem; letter-spacing: 5px;
      text-transform: uppercase; color: #000;
      font-style: italic;
    }

    /* ── Gift envelope ── */
    .gift-envelope-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      margin-top: 1.6rem;
    }
    .gift-toggle {
      font-size: 0.78rem; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(26,74,26,0.5);
      cursor: pointer; background: none; border: none;
      font-family: inherit; font-style: italic;
      transition: color 0.2s;
    }
    .gift-toggle:hover { color: var(--green); }
    .gift-envelope {
      position: relative;
      width: 100%; max-width: 300px;
      height: 160px;
      cursor: pointer;
      perspective: 900px;
      display: none;
    }
    .gift-envelope.active { display: block; }
    .gift-envelope-body {
      position: absolute; inset: 0;
      background: #fff;
      border: 1px solid rgba(26,74,26,0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .gift-envelope-flap {
      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
      background: #f4f8f4;
      border-left: 1px solid rgba(26,74,26,0.2);
      border-right: 1px solid rgba(26,74,26,0.2);
      transform-origin: 50% 0%;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
    }
    .gift-envelope.open .gift-envelope-flap { transform: rotateX(-185deg); }

    /* Gift message field (revealed after gift envelope opens) */
    .gift-message-area {
      display: none;
      flex-direction: column; gap: 0.8rem;
      width: 100%; max-width: 300px;
      animation: slide-up 0.5s ease forwards;
    }
    .gift-message-area.visible { display: flex; }
    @keyframes slide-up {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .gift-message-area textarea {
      width: 100%;
      height: 100px;
      border: 1px solid rgba(26,74,26,0.25);
      border-radius: 2px;
      padding: 0.8rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-style: italic; letter-spacing: 1px;
      color: #111; resize: none; outline: none;
      background: #fafdf8;
    }
    .gift-message-area input[type="text"] {
      width: 100%;
      border: none; border-bottom: 1px solid rgba(26,74,26,0.25);
      padding: 0.4rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; letter-spacing: 3px;
      color: #111; outline: none; background: transparent;
    }
    .gift-message-area input::placeholder,
    .gift-message-area textarea::placeholder { color: rgba(0,0,0,0.25); }
    .gift-save-btn {
      align-self: flex-end;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; letter-spacing: 4px;
      text-transform: uppercase;
      background: none; border: 1px solid var(--green);
      color: var(--green); padding: 0.35rem 1rem;
      cursor: pointer; border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }
    .gift-save-btn:hover { background: var(--green); color: #fff; }

    /* ── Passport body (revealed after envelope opens) ── */
    .passport-body {
      flex: 1; overflow-y: auto;
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.7s ease 0.4s, transform 0.7s ease 0.4s;
      display: none;
    }
    .passport-body.visible {
      display: block;
      opacity: 1; transform: translateY(0);
    }

    /* Footer */
    .passport-footer {
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      padding-top: 1.4rem;
      border-top: 1px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
    }

    /* Designer quote */
    .designer-note {
      margin-top: 2rem;
      font-size: 1.2rem; font-style: italic;
      line-height: 1.9; letter-spacing: 0.5px;
      color: #111;
    }

    .footer-mono img {
      width: 160px; height: 160px;
      object-fit: contain;
      filter: brightness(0) saturate(100%);
    }
    .footer-house {
      font-size: 0.82rem; letter-spacing: 5px;
      text-transform: uppercase; color: #000; font-weight: 400;
    }

    /* Not found */
    .not-found {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 1.2rem; text-align: center;
      padding: 2rem;
    }
    .not-found h1 {
      font-size: 2rem; letter-spacing: 6px;
      text-transform: uppercase; color: var(--maroon);
      font-weight: 300;
    }
    .not-found p {
      font-size: 1.2rem; letter-spacing: 2px;
      color: rgba(26,26,26,0.4);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .passport-wrap { grid-template-columns: 1fr; }
      .viewer-side { height: 55vw; min-height: 260px; }
      .details-side { padding: 2.4rem 1.6rem; }
      .garment-name { font-size: 2rem; }
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="load-mono">KD</div>
  <div class="load-bar"></div>
</div>

<!-- Main content (hidden until data loads) -->
<div class="passport-wrap" id="passport-wrap" style="display:none">

  <!-- Left: 3D model -->
  <div class="viewer-side">
    <canvas id="viewer-canvas"></canvas>
    <p class="viewer-hint">Drag to rotate</p>
    <!-- Wreath column — active wreath spins at same speed as header a2 -->
    <div class="wreath-col" id="wreath-col">
      <img src="images/Cotton Wreath.webp"  data-type="cotton"  alt="Cotton">
      <img src="images/Linen Wreath.webp"   data-type="linen"   alt="Linen">
      <img src="images/Wool Wreath.webp"    data-type="wool"    alt="Wool">
      <img src="images/Silk Wreath.webp"    data-type="silk"    alt="Silk">
      <img src="images/Leather Wreath.webp" data-type="leather" alt="Leather">
    </div>
  </div>

  <!-- Right: details -->
  <div class="details-side" id="details-side">
    <!-- filled by JS -->
  </div>

</div>

<!-- Not found (hidden by default) -->
<div class="not-found" id="not-found" style="display:none">
  <h1>Passport Not Found</h1>
  <p>This certificate does not exist or may have been issued privately.</p>
  <p style="margin-top:1.6rem;font-size:1rem;letter-spacing:3px;color:rgba(201,169,110,0.5)">
    KING DHORAJIYA · THE HOUSE OF SCION
  </p>
</div>

<script type="module">
  import * as THREE from 'https://esm.sh/three@0.169.0';
  import { GLTFLoader }    from 'https://esm.sh/three@0.169.0/examples/jsm/loaders/GLTFLoader.js';
  import { DRACOLoader }   from 'https://esm.sh/three@0.169.0/examples/jsm/loaders/DRACOLoader.js';
  import { OrbitControls } from 'https://esm.sh/three@0.169.0/examples/jsm/controls/OrbitControls.js';

  // ── Get passport ID from URL ──────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const passportId = params.get('id') || location.pathname.split('/').pop();

  if (!passportId) {
    showNotFound();
  } else {
    loadPassport(passportId);
  }

  async function loadPassport(id) {
    try {
      const res  = await fetch(`/api/passport/${encodeURIComponent(id.toUpperCase())}`);
      if (!res.ok) { showNotFound(); return; }
      const data = await res.json();
      renderPassport(data);
    } catch {
      showNotFound();
    }
  }

  function showNotFound() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('not-found').style.display = 'flex';
  }

  // ── Render passport — initial state: header + envelope + footer ──────────
  function renderPassport(p) {
    const createdDate = new Date(p.created_at).toLocaleDateString('en-GB', {
      day: 'numeric', month: 'long', year: 'numeric',
    });
    document.title = `${p.design_name} — KD Scion Passport`;

    document.getElementById('details-side').innerHTML = `

      <!-- HEADER: always visible -->
      <div class="passport-header">
        <div class="kd-seal"><img src="images/a2.webp" alt="KD Scion"></div>
        <div class="house-bespoke">Bespoke</div>
      </div>

      <!-- ENVELOPE STAGE: visible before opening -->
      <div class="envelope-stage" id="envelope-stage">

        <!-- Main passport envelope -->
        <div class="envelope" id="envelope" onclick="window._openEnvelope()">
          <div class="envelope-body"><p>Waiting to be explored</p></div>
          <div class="envelope-flap"></div>
          <!-- Bouquet seal: outside the clipped flap so it is never cut off -->
          <div class="bouquet-seal">
            <img class="seal-wreath" src="images/Linen Wreath.webp" alt="">
            <img class="seal-mono"   src="images/KD_monogram.png"   alt="">
          </div>
        </div>

        <!-- Gift envelope (optional) -->
        <div class="gift-envelope-wrap" id="gift-envelope-wrap">
          <button class="gift-toggle" onclick="window._toggleGift()">
            + Add a gift message
          </button>
          <div class="gift-envelope" id="gift-envelope" onclick="window._openGift()">
            <div class="gift-envelope-body"></div>
            <div class="gift-envelope-flap"></div>
          </div>
          <div class="gift-message-area" id="gift-message-area">
            <input type="text" id="gift-from" placeholder="From —">
            <textarea id="gift-msg" placeholder="Write your message here…"></textarea>
            <button class="gift-save-btn" onclick="window._saveGift()">Save</button>
          </div>
        </div>

      </div>

      <!-- BODY: hidden, revealed when envelope opens -->
      <div class="passport-body" id="passport-body">
        <p class="cert-title">Garment Passport</p>
        <h1 class="garment-name">${p.design_name}</h1>

        <div class="data-grid">
          <div class="data-row">
            <span class="data-label">Passport Number</span>
            <span class="data-value passport-num">${p.passport_number}</span>
          </div>
          <div class="data-row">
            <span class="data-label">Edition</span>
            <div class="data-value edition">
              <span class="edition-num">${p.edition_number}</span>
              <span class="edition-label">of this design · one of a kind</span>
            </div>
          </div>
          ${p.fabric_label ? `
          <div class="data-row">
            <span class="data-label">Fabric</span>
            <span class="data-value">${p.fabric_label}</span>
          </div>` : ''}
          <div class="data-row">
            <span class="data-label">Created For</span>
            <span class="data-value">${p.customer_initials || '—'}</span>
          </div>
          <div class="data-row">
            <span class="data-label">Date of Creation</span>
            <span class="data-value">${createdDate}</span>
          </div>
          <div class="data-row">
            <span class="data-label">Design Reference</span>
            <span class="data-value" style="font-family:'Courier New',monospace;font-size:1.1rem;letter-spacing:3px;color:rgba(26,74,26,0.6)">${p.product_sku}</span>
          </div>
        </div>

        <div class="auth-seal">
          <div class="seal-icon">◈</div>
          <div>
            <div class="seal-text-main">Authenticated Original</div>
            <div class="seal-text-sub">Made exclusively to its owner's measurements</div>
          </div>
        </div>

        <p class="designer-note">
          "Every piece that leaves the house carries a piece of its maker.
          This garment was imagined, designed, and entrusted to you —
          and to you alone."
        </p>
      </div>

      <!-- FOOTER: always visible -->
      <div class="passport-footer">
        <div class="footer-mono"><img src="images/KD_monogram.png" alt="KD"></div>
        <p class="footer-house">· the house of scion</p>
      </div>
    `;

    // ── Gift envelope handlers ────────────────────────────────────────────────
    window._toggleGift = function(e) {
      if (e) e.stopPropagation();
      const env = document.getElementById('gift-envelope');
      env.classList.toggle('active');
    };
    window._openGift = function() {
      const env  = document.getElementById('gift-envelope');
      const area = document.getElementById('gift-message-area');
      if (env.classList.contains('open')) return;
      env.classList.add('open');
      setTimeout(() => { area.classList.add('visible'); }, 600);
    };
    window._saveGift = function() {
      const from = document.getElementById('gift-from').value.trim();
      const msg  = document.getElementById('gift-msg').value.trim();
      if (!msg) return;
      localStorage.setItem(`kd_gift_${passportId}`, JSON.stringify({ from, msg }));
      const btn = document.querySelector('.gift-save-btn');
      btn.textContent = 'Saved ✓'; btn.style.background = 'var(--green)'; btn.style.color = '#fff';
      setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; btn.style.color = ''; }, 2500);
    };
    // Restore saved gift message if exists
    const saved = localStorage.getItem(`kd_gift_${passportId}`);
    if (saved) {
      try {
        const { from, msg } = JSON.parse(saved);
        setTimeout(() => {
          const fi = document.getElementById('gift-from');
          const ta = document.getElementById('gift-msg');
          if (fi) fi.value = from;
          if (ta) ta.value = msg;
        }, 100);
      } catch (_) {}
    }

    // ── Envelope open handler (attached to window so onclick works) ──────────
    window._openEnvelope = function() {
      const envelope = document.getElementById('envelope');
      const stage    = document.getElementById('envelope-stage');
      const body     = document.getElementById('passport-body');

      // 1. Open flap
      envelope.classList.add('open');

      // 2. After flap lifts, show body content
      setTimeout(() => {
        body.style.display = 'block';
        requestAnimationFrame(() => body.classList.add('visible'));
      }, 600);

      // 3. Fade out and collapse envelope stage
      setTimeout(() => {
        stage.classList.add('hiding');
        setTimeout(() => { stage.style.display = 'none'; }, 500);
      }, 700);
    };

    // Show passport panel
    const wrap = document.getElementById('passport-wrap');
    wrap.style.display = 'grid';
    setTimeout(() => wrap.classList.add('visible'), 50);
    document.getElementById('loading').classList.add('hidden');

    // Activate matching wreath
    activateWreath(p.fabric_id);

    // Start 3D viewer
    if (p.glb_path) initViewer(p.glb_path);
  }

  // ── Wreath activation ─────────────────────────────────────────────────────
  function activateWreath(fabricId) {
    // TEST MODE: force linen to spin regardless of fabric_id
    // Remove the next line once testing is done
    fabricId = 'linen-1';

    if (!fabricId) return;
    const id = fabricId.toLowerCase().replace('tt-', '');
    let type = null;
    if (id.startsWith('cotton-linen') || id.startsWith('cotton_linen')) type = 'cotton';
    else if (id.startsWith('cotton-wool') || id.startsWith('cotton_wool')) type = 'wool';
    else if (id.startsWith('cotton'))  type = 'cotton';
    else if (id.startsWith('linen'))   type = 'linen';
    else if (id.startsWith('wool'))    type = 'wool';
    else if (id.startsWith('silk'))    type = 'silk';
    else if (id.startsWith('leather')) type = 'leather';

    if (!type) return;
    document.querySelectorAll('.wreath-col img').forEach(img => {
      if (img.dataset.type === type) img.classList.add('spinning');
    });
  }

  // ── 3D Viewer ─────────────────────────────────────────────────────────────
  function initViewer(glbPath) {
    const canvas = document.getElementById('viewer-canvas');
    const panel  = canvas.parentElement;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setClearColor(0xf4f3f0, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(panel.clientWidth, panel.clientHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, panel.clientWidth / panel.clientHeight, 0.01, 1000);
    camera.position.set(0, 0, 3);

    // Clean daylight lighting for white background
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const key  = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(4, 8, 6); scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-6, 2, -4); scene.add(fill);
    const rim  = new THREE.DirectionalLight(0xffffff, 0.3);
    rim.position.set(0, -4, -8); scene.add(rim);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.enablePan      = false;
    controls.autoRotate     = true;
    controls.autoRotateSpeed = 0.6;
    controls.target.set(0, 0, 0);
    controls.update();

    // Stop auto-rotate when user interacts, resume after 4s idle
    let idleTimer;
    controls.addEventListener('start', () => {
      controls.autoRotate = false;
      clearTimeout(idleTimer);
    });
    controls.addEventListener('end', () => {
      idleTimer = setTimeout(() => { controls.autoRotate = true; }, 4000);
    });

    const loader = new GLTFLoader();
    const draco  = new DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
    loader.setDRACOLoader(draco);

    loader.load(glbPath, (gltf) => {
      const model = gltf.scene;
      const box   = new THREE.Box3().setFromObject(model);
      model.position.sub(box.getCenter(new THREE.Vector3()));
      model.scale.setScalar(2.2 / box.getSize(new THREE.Vector3()).length());
      scene.add(model);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
      renderer.setSize(panel.clientWidth, panel.clientHeight, false);
      camera.aspect = panel.clientWidth / panel.clientHeight;
      camera.updateProjectionMatrix();
    });
  }
</script>
