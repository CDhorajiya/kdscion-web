<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="images/KD_monogram.png" type="">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Brief — King Dhorajiya</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      background: #fff;
      color: #1a1a1a;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .monogram img { filter: none; }
    .nav .brand-name h1 { color: #1a1a1a; }

    /* ── Wrap ── */
    .brief-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 3rem 9rem;
    }

    /* ── Top bar: title + print ── */
    .brief-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-top: 2px solid #111;
      padding-top: 2rem;
      margin-bottom: 3.5rem;
    }
    .brief-heading {
      font-family: "Times New Roman", serif;
      font-size: 1.6rem;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #111;
      font-weight: 400;
      margin: 0 0 1.4rem;
    }
    .brief-meta-row {
      display: flex;
      gap: 3rem;
      align-items: baseline;
    }
    .brief-meta-label {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #111;
      margin: 0 0 0.2rem;
    }
    .brief-ref {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #111;
      margin: 0;
    }
    .brief-date {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #111;
      margin: 0;
    }
    .print-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid #888;
      padding: 0.6rem 1.6rem;
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-top: 0.2rem;
    }
    .print-btn:hover { border-color: #111; }

    /* ── Dividers ── */
    .brief-divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 3.2rem 0;
    }

    /* ── Section labels ── */
    .brief-section-label {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #111;
      margin: 0 0 2rem;
      font-weight: 400;
    }

    /* ── Garment item ── */
    .garment-item {
      margin-bottom: 2.4rem;
    }
    .garment-main-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #efefef;
      margin-bottom: 0.8rem;
    }
    .garment-name {
      font-family: "Times New Roman", serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: #111;
      font-weight: 400;
      margin: 0;
    }
    .garment-price {
      font-family: "Times New Roman", serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: #111;
      margin: 0;
      white-space: nowrap;
    }
    .garment-meta {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: 0.5rem 1rem;
      margin-top: 0.6rem;
    }
    .garment-meta-key {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #111;
      align-self: baseline;
      padding-top: 0.1rem;
    }
    .garment-meta-val {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 1.5px;
      color: #111;
      align-self: baseline;
    }
    .garment-meta-val.code {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #111;
    }
    .garment-qty {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #111;
      margin: 0.6rem 0 0;
    }

    /* ── Total row ── */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 2px solid #111;
      padding-top: 1.6rem;
      margin-top: 1rem;
    }
    .total-label {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #111;
    }
    .total-amount {
      font-family: "Times New Roman", serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: #111;
    }

    /* ── Measurements ── */
    .meas-groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 4rem;
    }
    .meas-group { margin-bottom: 2.2rem; }
    .meas-group-title {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: #111;
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #ccc;
    }
    .meas-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.35rem 0;
      border-bottom: 1px solid #e8e8e8;
    }
    .meas-key {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: #111;
    }
    .meas-val {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      letter-spacing: 1.5px;
      color: #111;
      font-weight: 400;
    }
    .meas-none {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #111;
    }

    /* ── Address ── */
    .address-block {
      font-family: "Times New Roman", serif;
      font-size: 1.3rem;
      letter-spacing: 1.5px;
      color: #111;
      line-height: 2;
      margin: 0;
    }

    /* ── Notes ── */
    .notes-block {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #111;
      line-height: 2;
      font-style: italic;
      margin: 0;
    }

    /* ── Loading / error ── */
    .brief-loading {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #111;
      text-align: center;
      padding: 6rem 0;
      margin: 0;
    }
    .brief-error {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #c0392b;
      text-align: center;
      padding: 6rem 0;
      margin: 0;
    }

    /* ── Footer ── */
    .brief-footer {
      margin-top: 5rem;
      border-top: 1px solid #e8e8e8;
      padding-top: 3rem;
      text-align: center;
    }
    .brief-footer-note {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #111;
      line-height: 2.8;
      margin: 0 0 2.5rem;
    }
    .brief-seal {
      display: block;
      width: 90px;
      margin: 0 auto 2.4rem;
      opacity: 0.85;
    }
    .return-link {
      display: inline-block;
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .return-link:hover { opacity: 0.5; }

    /* ── Print ── */
    @media print {
      header, .print-btn, .return-link, .footer, .brief-seal, .brief-footer { display: none !important; }
      .brief-wrap { padding: 0; max-width: 100%; }
      html, body { background: #fff; }
      .brief-header { border-top: 2px solid #111; padding-top: 0; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav collapsible">
      <a href="index.html" class="brand-name"><h1>KING DHORAJIYA</h1></a>
      <svg class="icon nav__toggler">
        <use xlink:href="images/sprite.svg#menu"></use>
      </svg>
      <a class="bb" href="bespokeboutique.html"><img src="images/Drawing.svg" alt="Bespoke Boutique link"></a>
    </nav>
  </header>

  <div class="brief-wrap" id="brief-wrap">
    <p class="brief-loading" id="brief-loading">Loading…</p>
  </div>

  <script type="module">
    import { getOrder, getOrders, getMeasurements, isLoggedIn } from './js/api.js';
    import { openAuthModal } from './js/auth-modal.js';

    if (!isLoggedIn()) {
      openAuthModal(() => window.location.reload());
    }

    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('order');
    const wrap    = document.getElementById('brief-wrap');

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmt(n) { return `$${Number(n).toLocaleString()}`; }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function addrLines(a) {
      if (!a) return '—';
      return [a.line1, a.line2, a.city, a.state, a.postalCode, a.country]
        .filter(Boolean).join(', ');
    }

    // ── Measurement display map ───────────────────────────────────────────────
    const MEAS_GROUPS = [
      {
        title: 'General',
        fields: [
          { key: 'height',       label: 'Height',       unit: 'cm' },
          { key: 'weight',       label: 'Weight',       unit: 'kg' },
        ],
      },
      {
        title: 'Upper Body',
        fields: [
          { key: 'neck',         label: 'Neck',         unit: 'cm' },
          { key: 'shoulder',     label: 'Shoulder',     unit: 'cm' },
          { key: 'chest',        label: 'Chest',        unit: 'cm' },
          { key: 'underbust',    label: 'Under Bust',   unit: 'cm' },
          { key: 'waist',        label: 'Waist',        unit: 'cm' },
          { key: 'highhip',      label: 'High Hip',     unit: 'cm' },
          { key: 'hip',          label: 'Full Hip',     unit: 'cm' },
          { key: 'backlength',   label: 'Back Length',  unit: 'cm' },
        ],
      },
      {
        title: 'Arms',
        fields: [
          { key: 'armlength',    label: 'Arm Length',   unit: 'cm' },
          { key: 'bicep',        label: 'Bicep',        unit: 'cm' },
          { key: 'wrist',        label: 'Wrist',        unit: 'cm' },
        ],
      },
      {
        title: 'Lower Body',
        fields: [
          { key: 'inseam',       label: 'Inseam',       unit: 'cm' },
          { key: 'outseam',      label: 'Outseam',      unit: 'cm' },
          { key: 'knee',         label: 'Knee',         unit: 'cm' },
          { key: 'calf',         label: 'Calf',         unit: 'cm' },
          { key: 'ankle',        label: 'Ankle',        unit: 'cm' },
          { key: 'waisttoankle', label: 'Waist–Ankle',  unit: 'cm' },
        ],
      },
    ];

    function buildMeasHtml(meas) {
      if (!meas || Object.keys(meas).length === 0) {
        return `<p class="meas-none">No measurements on file.</p>`;
      }
      let html = `<div class="meas-groups">`;
      const cols = [
        MEAS_GROUPS.slice(0, 2),
        MEAS_GROUPS.slice(2),
      ];
      cols.forEach(groups => {
        html += `<div>`;
        groups.forEach(group => {
          const rows = group.fields.filter(f => meas[f.key] != null);
          if (!rows.length) return;
          html += `<div class="meas-group">
            <p class="meas-group-title">${group.title}</p>`;
          rows.forEach(f => {
            html += `<div class="meas-row">
              <span class="meas-key">${f.label}</span>
              <span class="meas-val">${meas[f.key]} ${f.unit}</span>
            </div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
      return html;
    }

    // ── Fabric type from ID ───────────────────────────────────────────────────
    function fabricTypeFromId(id) {
      if (!id) return '';
      if (id.startsWith('cotton-linen')) return 'Cotton-Linen Blend';
      if (id.startsWith('cotton-wool'))  return 'Cotton-Wool Blend';
      if (id.startsWith('cotton'))       return 'Cotton';
      if (id.startsWith('linen'))        return 'Linen';
      if (id.startsWith('wool'))         return 'Wool';
      return '';
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(order, meas) {
      const items = order.items ?? order.cartItems ?? [];
      const total = items.reduce((s, i) => s + Number(i.unitPrice ?? 0) * (i.quantity ?? 1), 0);
      const addr  = order.shippingAddress;

      // Items HTML
      let itemsHtml = '';
      items.forEach(item => {
        const name       = item.displayName ?? item.product?.name ?? 'Bespoke Garment';
        const designRef  = item.product?.sku ?? item.product?.id ?? '';
        const selections = item.configuratorSession?.selections ?? {};
        const selValues  = Object.values(selections);
        const fabricVal  = selValues[0] ?? null;
        const fabricName = fabricVal?.label ?? '';
        const fabricId   = fabricVal?.id ?? '';
        const fabricType = fabricTypeFromId(fabricId);
        const price      = Number(item.unitPrice ?? 0) * (item.quantity ?? 1);

        const metaRows = [];
        if (designRef)  metaRows.push(`<span class="garment-meta-key">Design</span><span class="garment-meta-val code">${designRef}</span>`);
        if (fabricName) metaRows.push(`<span class="garment-meta-key">Fabric</span><span class="garment-meta-val">${fabricName}</span>`);
        if (fabricType) metaRows.push(`<span class="garment-meta-key">Type</span><span class="garment-meta-val">${fabricType}</span>`);
        if (fabricId)   metaRows.push(`<span class="garment-meta-key">Ref.</span><span class="garment-meta-val code">${fabricId}</span>`);

        const metaHtml = metaRows.length
          ? `<div class="garment-meta">${metaRows.join('')}</div>`
          : '';

        itemsHtml += `
          <div class="garment-item">
            <div class="garment-main-row">
              <p class="garment-name">${name}</p>
              <p class="garment-price">${fmt(price)}</p>
            </div>
            ${metaHtml}
            ${(item.quantity ?? 1) > 1 ? `<p class="garment-qty">Qty ${item.quantity}</p>` : ''}
          </div>`;
      });

      if (!itemsHtml) {
        itemsHtml = `<p class="meas-none">No items found for this order.</p>`;
      }

      // Notes
      const notesHtml = order.notes
        ? `<hr class="brief-divider">
           <p class="brief-section-label">Notes</p>
           <p class="notes-block">${order.notes}</p>`
        : '';

      const dateStr = fmtDate(order.createdAt);
      const refStr  = order.id ?? orderId ?? '—';

      wrap.innerHTML = `
        <div class="brief-header">
          <div>
            <h2 class="brief-heading">Order Brief</h2>
            <div class="brief-meta-row">
              <div>
                <p class="brief-meta-label">Reference</p>
                <p class="brief-ref">${refStr}</p>
              </div>
              ${dateStr ? `<div>
                <p class="brief-meta-label">Date</p>
                <p class="brief-date">${dateStr}</p>
              </div>` : ''}
            </div>
          </div>
          <button class="print-btn" onclick="window.print()">Print</button>
        </div>

        <!-- Garments -->
        <p class="brief-section-label">Garment</p>
        ${itemsHtml}
        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-amount">${fmt(total)}</span>
        </div>

        <!-- Measurements -->
        <hr class="brief-divider">
        <p class="brief-section-label">Measurements on File</p>
        ${buildMeasHtml(meas?.measurements ?? meas)}

        <!-- Delivery -->
        <hr class="brief-divider">
        <p class="brief-section-label">Delivery Address</p>
        <p class="address-block">${addrLines(addr)}</p>

        ${notesHtml}

        <!-- Footer -->
        <div class="brief-footer">
          <p class="brief-footer-note">
            The House of Scion &nbsp;·&nbsp; King Dhorajiya<br>
            Your garment will be crafted to the above specifications.<br>
            For any amendments, contact the house directly.
          </p>
          <a href="index.html">
            <img src="images/KD_monogram.png" alt="King Dhorajiya" class="brief-seal">
          </a>
          <a href="poolofdesigns-productdescription.html" class="return-link">← Return to Pool of Designs</a>
        </div>
      `;
    }

    // ── Load data ─────────────────────────────────────────────────────────────
    async function load() {
      try {
        let order = null;

        if (orderId) {
          try {
            order = await getOrder(orderId);
          } catch (_) {
            const list = await getOrders();
            const orders = Array.isArray(list) ? list : (list?.data ?? []);
            order = orders.find(o => String(o.id) === String(orderId)) ?? null;
          }
        }

        if (!order) {
          order = { id: orderId, items: [], shippingAddress: null, createdAt: null };
        }

        const measRes = await getMeasurements().catch(() => null);
        render(order, measRes);

      } catch (err) {
        wrap.innerHTML = `<p class="brief-error">${err.message ?? 'Could not load order details.'}</p>`;
      }
    }

    load();
  </script>

</body>
</html>
