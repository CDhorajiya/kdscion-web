<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="images/KD_monogram.png" type="">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Dashboard — King Dhorajiya</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── PIN Gate ── */
    #pin-gate {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    #pin-gate.hidden { display: none; }
    .pin-monogram {
      width: 96px;
      opacity: 1;
    }
    .pin-title {
      font-family: "Times New Roman", serif;
      font-size: 1.6rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #111;
      margin: 0;
      font-weight: 400;
    }
    .pin-input {
      font-family: "Courier New", monospace;
      font-size: 2.6rem;
      letter-spacing: 0.5rem;
      text-align: center;
      width: 13rem;
      border: none;
      border-bottom: 2px solid #111;
      outline: none;
      background: transparent;
      color: #111;
      padding: 0.4rem 0;
      transition: border-color 0.2s;
      -webkit-text-security: disc;
    }
    .pin-input:focus { border-bottom-color: #111; }
    .pin-error {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #c0392b;
      min-height: 1.2rem;
      margin: 0;
    }
    .pin-hint {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin: 0;
    }
  </style>
  <style>
    html, body {
      background: #f4f3f0;
      color: #111;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    .monogram img { filter: none; }
    .nav .brand-name h1 { color: #1a1a1a; }

    /* ── Wrap ── */
    .dash-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2.5rem 8rem;
    }

    /* ── Header bar ── */
    .dash-titlebar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 2px solid #111;
      padding-top: 2rem;
      margin-bottom: 1rem;
    }
    .dash-title {
      font-family: "Times New Roman", serif;
      font-size: 1.55rem;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: #111;
      font-weight: 400;
      margin: 0 0 0.3rem;
    }
    .dash-subtitle {
      font-family: "Times New Roman", serif;
      font-size: 1.05rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
      margin: 0;
    }
    .dash-badge {
      font-family: "Courier New", monospace;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #888;
      padding: 0.4rem 1rem;
      border: 1px solid #ccc;
      border-radius: 2px;
      background: #fff;
    }

    /* ── Loading / error ── */
    .dash-loading, .dash-error {
      font-family: "Times New Roman", serif;
      font-size: 1.3rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #999;
      text-align: center;
      padding: 6rem 0;
      margin: 0;
    }
    .dash-error { color: #c0392b; }

    /* ── Tabs ── */
    .dash-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 2.5rem;
    }
    .dash-tab {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #aaa;
      padding: 0.7rem 2rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      margin-bottom: -2px;
      transition: color 0.2s;
    }
    .dash-tab:hover { color: #555; }
    .dash-tab.active { color: #111; border-bottom-color: #111; }

    .dash-pane { display: none; }
    .dash-pane.active { display: block; }

    /* ── Prices panel ── */
    .prices-section { margin-bottom: 2.5rem; }
    .prices-section-title {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: #aaa;
      margin: 0 0 1.2rem;
      font-weight: 400;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e8e8e8;
    }
    .prices-table {
      width: 100%;
      border-collapse: collapse;
    }
    .prices-table th {
      font-family: "Times New Roman", serif;
      font-size: 0.9rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #bbb;
      text-align: left;
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #e8e8e8;
      font-weight: 400;
    }
    .prices-table td {
      padding: 0.55rem 0.8rem;
      border-bottom: 1px solid #f4f4f4;
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #333;
    }
    .prices-table td:first-child {
      font-family: "Courier New", monospace;
      font-size: 0.92rem;
      color: #555;
    }
    .price-input {
      width: 100px;
      border: 1px solid #ddd;
      border-radius: 2px;
      padding: 0.35rem 0.6rem;
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
      text-align: right;
    }
    .price-input:focus { border-color: #888; background: #fff; }
    .save-prices-btn {
      margin-top: 1.4rem;
      padding: 0.8rem 2.5rem;
      background: #111;
      border: 1px solid #111;
      color: #fff;
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .save-prices-btn:hover { background: #444; border-color: #444; }
    .prices-saved-msg {
      display: inline-block;
      margin-left: 1rem;
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 3px;
      color: #388e3c;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .prices-saved-msg.show { opacity: 1; }

    /* ── Divider ── */
    .dash-divider {
      border: none;
      border-top: 1px solid #ddd;
      margin: 3rem 0;
    }

    /* ── Order card ── */
    .order-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    /* ── Card header ── */
    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2rem;
      border-bottom: 1px solid #e8e8e8;
      background: #fafaf9;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .order-card-id {
      font-family: "Courier New", monospace;
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: #111;
      margin: 0;
    }
    .order-card-date {
      font-family: "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: #888;
      margin: 0;
    }
    .order-card-status {
      display: inline-block;
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      border: 1px solid #c8e6c9;
      background: #f1f8f1;
      color: #388e3c;
    }
    .order-card-status.status-pending {
      border-color: #ffe0b2;
      background: #fff8f0;
      color: #e65100;
    }
    .order-email-btn {
      padding: 0.6rem 1.6rem;
      background: #111;
      border: 1px solid #111;
      color: #fff;
      font-family: "Times New Roman", serif;
      font-size: 1.05rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, color 0.2s;
    }
    .order-email-btn:hover {
      background: #444;
      border-color: #444;
    }

    /* ── Card body ── */
    .order-card-body {
      padding: 2rem 2rem 1.6rem;
    }

    /* ── Two-column top section ── */
    .order-top-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    /* ── Section label ── */
    .section-label {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: #aaa;
      margin: 0 0 1.2rem;
      font-weight: 400;
    }

    /* ── Design / fabric block ── */
    .design-fabric-block {
      display: flex;
      gap: 1.4rem;
      align-items: flex-start;
    }
    .df-image {
      width: 100px;
      height: 120px;
      object-fit: cover;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      flex-shrink: 0;
      background: #f4f4f4;
    }
    .df-placeholder {
      width: 100px;
      height: 120px;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      flex-shrink: 0;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 1.8rem;
    }
    .df-details { flex: 1; }
    .df-name {
      font-family: "Times New Roman", serif;
      font-size: 1.35rem;
      letter-spacing: 1.5px;
      color: #111;
      margin: 0 0 0.5rem;
      font-weight: 400;
    }
    .df-row {
      display: flex;
      gap: 0.6rem;
      align-items: baseline;
      margin-bottom: 0.3rem;
    }
    .df-key {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
      min-width: 3.5rem;
    }
    .df-val {
      font-family: "Courier New", monospace;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
      color: #333;
    }
    .df-val.plain {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: #333;
    }

    /* ── Customer block ── */
    .customer-block {
      font-family: "Times New Roman", serif;
      font-size: 1.25rem;
      letter-spacing: 1.5px;
      color: #111;
      line-height: 2.1;
    }
    .customer-block .cust-label {
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
    }

    /* ── Price row ── */
    .order-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 2px solid #111;
      padding-top: 1.4rem;
      margin-top: 1.4rem;
    }
    .price-label {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: #aaa;
    }
    .price-amount {
      font-family: "Times New Roman", serif;
      font-size: 1.7rem;
      letter-spacing: 3px;
      color: #111;
    }

    /* ── Measurements ── */
    .meas-section { margin-top: 1.6rem; }
    .meas-divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 1.6rem 0;
    }
    .meas-groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 3.5rem;
    }
    .meas-group { margin-bottom: 1.8rem; }
    .meas-group-title {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #bbb;
      margin: 0 0 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #eee;
    }
    .meas-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.28rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .meas-key {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #555;
    }
    .meas-val {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 1.5px;
      color: #111;
      font-weight: 400;
    }
    .meas-none {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      letter-spacing: 2px;
      color: #bbb;
      font-style: italic;
    }

    /* ── Notes ── */
    .notes-text {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #555;
      font-style: italic;
      line-height: 1.9;
      margin: 0;
    }

    /* ── Empty state ── */
    .dash-empty {
      text-align: center;
      padding: 5rem 0;
      font-family: "Times New Roman", serif;
      font-size: 1.3rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ccc;
    }

    /* ── Refresh button ── */
    .dash-refresh {
      background: none;
      border: 1px solid #ccc;
      padding: 0.5rem 1.4rem;
      font-family: "Times New Roman", serif;
      font-size: 1.05rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .dash-refresh:hover { border-color: #888; color: #333; }

    /* ── Summary bar ── */
    .dash-summary {
      display: flex;
      gap: 2rem;
      margin: 1.8rem 0 2.5rem;
      flex-wrap: wrap;
    }
    .summary-stat {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      padding: 1rem 1.6rem;
      flex: 1;
      min-width: 160px;
    }
    .summary-stat-num {
      font-family: "Times New Roman", serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: #111;
      margin: 0 0 0.2rem;
    }
    .summary-stat-label {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #aaa;
      margin: 0;
    }

    /* ── Fabrics panel ── */
    .fab-type-block {
      margin-bottom: 2.2rem;
      border: 1px solid #e8e8e8;
      border-radius: 3px;
      overflow: hidden;
    }
    .fab-type-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      background: #fafaf9;
      border-bottom: 1px solid #e8e8e8;
    }
    .fab-type-name {
      font-family: "Times New Roman", serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #111;
      margin: 0;
      font-weight: 400;
    }
    .fab-coll-block {
      padding: 1rem 1.4rem;
      border-bottom: 1px solid #f4f4f4;
    }
    .fab-coll-block:last-child { border-bottom: none; }
    .fab-coll-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }
    .fab-coll-name {
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
      margin: 0;
    }
    .fab-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .fab-swatch-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.7rem;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      background: #fafafa;
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 1px;
      color: #333;
    }
    .fab-swatch-item img {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 2px;
      border: 1px solid #ddd;
    }
    .fab-swatch-del {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0 0 0.4rem;
      transition: color 0.2s;
    }
    .fab-swatch-del:hover { color: #c0392b; }
    .fab-toggle {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 22px;
      flex-shrink: 0;
    }
    .fab-toggle input { opacity: 0; width: 0; height: 0; }
    .fab-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .fab-slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .fab-toggle input:checked + .fab-slider { background: #111; }
    .fab-toggle input:checked + .fab-slider:before { transform: translateX(20px); }
    .fab-add-form {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .fab-add-input {
      border: 1px solid #ddd;
      border-radius: 2px;
      padding: 0.35rem 0.7rem;
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .fab-add-input:focus { border-color: #888; background: #fff; }
    .fab-add-btn {
      padding: 0.35rem 1.2rem;
      background: #111;
      border: 1px solid #111;
      color: #fff;
      font-family: "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .fab-add-btn:hover { background: #444; border-color: #444; }
    .fab-save-bar {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    @media (max-width: 700px) {
      .order-top-cols { grid-template-columns: 1fr; }
      .meas-groups { grid-template-columns: 1fr; }
      .dash-wrap { padding: 2rem 1.2rem 6rem; }
    }
  </style>
</head>
<body>

  <!-- ── PIN Gate ── -->
  <div id="pin-gate">
    <img src="images/KD_monogram.png" alt="KD" class="pin-monogram">
    <p class="pin-title">Workshop Access</p>
    <input
      type="tel"
      id="pin-input"
      class="pin-input"
      maxlength="6"
      placeholder="· · · · · ·"
      autocomplete="off"
      autofocus
    >
    <p class="pin-error" id="pin-error"></p>
    <p class="pin-hint">Enter PIN to continue</p>
    <a href="index.html" style="position:absolute;bottom:2rem;right:2.5rem;font-family:'Times New Roman',serif;font-size:1.1rem;letter-spacing:4px;text-transform:uppercase;color:#111;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#111'">← Home</a>
  </div>

  <header>
    <nav class="nav collapsible">
      <a href="index.html" class="brand-name"><h1>KING DHORAJIYA</h1></a>
      <svg class="icon nav__toggler">
        <use xlink:href="images/sprite.svg#menu"></use>
      </svg>
      <a class="bb" href="bespokeboutique.html"><img src="images/Drawing.svg" alt="Bespoke Boutique link"></a>
    </nav>
  </header>

  <div class="dash-wrap">
    <div class="dash-titlebar">
      <div>
        <h2 class="dash-title">Workshop Dashboard</h2>
        <p class="dash-subtitle">Order briefs for production team</p>
      </div>
      <div style="display:flex;gap:1rem;align-items:center;">
        <span class="dash-badge" id="order-count">—</span>
        <button class="dash-refresh" id="refresh-btn" onclick="loadOrders()">Refresh</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="dash-tabs">
      <button class="dash-tab active" onclick="switchTab('orders')">Orders</button>
      <button class="dash-tab" onclick="switchTab('prices')">Prices</button>
      <button class="dash-tab" onclick="switchTab('fabrics')">Fabrics</button>
    </div>

    <!-- Orders pane -->
    <div id="pane-orders" class="dash-pane active">
      <!-- Summary stats -->
      <div class="dash-summary" id="dash-summary" style="display:none">
        <div class="summary-stat">
          <p class="summary-stat-num" id="stat-total">0</p>
          <p class="summary-stat-label">Total Orders</p>
        </div>
        <div class="summary-stat">
          <p class="summary-stat-num" id="stat-revenue">$0</p>
          <p class="summary-stat-label">Total Revenue</p>
        </div>
      </div>
      <div id="orders-container">
        <p class="dash-loading" id="dash-loading">Loading orders…</p>
      </div>
    </div>

    <!-- Prices pane -->
    <div id="pane-prices" class="dash-pane">
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:3px;padding:2rem 2.5rem;">

        <!-- Designs -->
        <div class="prices-section">
          <p class="prices-section-title">Design Prices</p>
          <table class="prices-table">
            <thead><tr>
              <th>SKU</th>
              <th>Design Name</th>

  <script type="module">

        let typesHtml = '';

              ${typesHtml}

      });

      // ── Section 2: global swatch catalog (add/manage swatches) ─────────────
      let swatchMgmtHtml = '';
      catalog.forEach(type => {
        let collsHtml = '';
        type.collections.forEach(coll => {
          const swatchItems = coll.swatches.map(s => {
            const visible = sOn(s.id);
            const isExtra = !!(overrides.extras?.[`${type.id}:${coll.id}`]?.find(e => e.id === s.id));
            return `<div class="fab-swatch-item">
              <img src="${s.image}" alt="${s.label}">
              <span>${s.label}</span>
              <label class="fab-toggle" title="Show/hide globally">
                <input type="checkbox" ${visible ? 'checked' : ''}
                  onchange="setVisibility('s:${s.id}', this.checked)">
                <span class="fab-slider"></span>
              </label>
              ${isExtra ? `<button class="fab-swatch-del" onclick="deleteSwatch('${type.id}','${coll.id}','${s.id}')">✕</button>` : ''}
            </div>`;
          }).join('');

          collsHtml += `
            <div class="fab-coll-block">
              <div class="fab-coll-header">
                <p class="fab-coll-name">${coll.label}</p>
              </div>
              <div class="fab-swatches">${swatchItems || '<span style="color:#ccc;font-family:Times New Roman,serif;font-size:1rem;letter-spacing:2px">No swatches</span>'}</div>

                <input class="fab-add-input" placeholder="Label (e.g. Cotton 3)"

                  id="img-${type.id}-${coll.id}" style="width:200px">
                <button class="fab-add-btn" onclick="addSwatch('${type.id}','${coll.id}')">+ Add</button>
              </div>
            </div>`;
        });

        const wreaths = type.wreaths.map(w =>
          `<img src="${w}" style="width:28px;height:28px;object-fit:contain;margin-right:4px">`

          <div class="fab-type-block">
            <div class="fab-type-header">
              <p class="fab-type-name">${wreaths}${type.label}</p>

      panel.innerHTML = `

        </p>
        ${productsHtml}

        <hr style="border:none;border-top:2px solid #e0e0e0;margin:2.5rem 0;">

        <!-- Global swatch catalog -->
        <p class="section-label" style="margin-bottom:1.4rem">Global Swatch Catalog</p>
        <p style="font-family:'Times New Roman',serif;font-size:1rem;letter-spacing:2px;color:#aaa;margin:0 0 1.6rem;">
          Add new swatches here · they appear in all designs where that fabric type is ON
        </p>
        ${swatchMgmtHtml}

    // Toggle accordion
    window.toggleProductAccordion = function(id) {
      const el    = document.getElementById(id);
      const sku   = id.replace('acc-', '');
      const arrow = document.getElementById(`arrow-${sku}`);
      const open  = el.style.display !== 'none';
      el.style.display    = open ? 'none' : 'block';
      arrow.style.transform = open ? '' : 'rotate(90deg)';
    };

    // Show/hide collection rows when parent type toggle changes
    window.rerenderTypeCollections = function(checkbox, sku, typeId) {
      const el = document.getElementById(`colls-${sku}-${typeId}`);
      if (el) el.style.display = checkbox.checked ? '' : 'none';
    };

    // Save a single visibility key
    window.setVisibility = function(key, on) {
      const overrides = loadFabricOverrides();
      if (!overrides.visibility) overrides.visibility = {};
      overrides.visibility[key] = on;
      saveFabricOverrides(overrides);
    };

    window.addSwatch = function(typeId, collId) {
      const lblEl = document.getElementById(`lbl-${typeId}-${collId}`);
      const imgEl = document.getElementById(`img-${typeId}-${collId}`);
      const label = lblEl.value.trim();
      const image = imgEl.value.trim();
      if (!label || !image) { alert('Enter both a label and an image path.'); return; }

      const id        = `${typeId}-${collId}-${Date.now()}`;
      const overrides = loadFabricOverrides();
      if (!overrides.extras) overrides.extras = {};
      const key = `${typeId}:${collId}`;
      if (!overrides.extras[key]) overrides.extras[key] = [];
      overrides.extras[key].push({ id, label, image });
      saveFabricOverrides(overrides);

      lblEl.value = '';
      imgEl.value = '';
      renderFabricsPanel();
    };

    window.deleteSwatch = function(typeId, collId, swatchId) {
      const overrides = loadFabricOverrides();
      const key = `${typeId}:${collId}`;
      if (overrides.extras?.[key]) {
        overrides.extras[key] = overrides.extras[key].filter(s => s.id !== swatchId);
        saveFabricOverrides(overrides);
        renderFabricsPanel();
      }
    };

    renderFabricsPanel();

    if (!isLoggedIn()) {
      openAuthModal(() => window.location.reload());
    }

    const WORKSHOP_EMAIL = 'chirag.dhorajiya116@gmail.com';

    // ── Design image map ──────────────────────────────────────────────────────
    const DESIGN_IMAGES = {
      '1':  'images/KDscion-p1-full sleeve classic shirt.png',
      '2':  'images/KDscion-p2-half sleeve overall dress.png',
      '6':  'images/KDscion-p6-sleeveless dress.png',
      '8':  'images/KDscion-p8-sleeveless sheath dress.png',
      '11': 'images/KDscion-p11-half sleeve A-line dress.png',
      '12': 'images/KDscion-p12-full sleeve A-line dress.png',
      '32': 'images/KDscion-p32-quarter sleeve A-line dress.png',
      '34': 'images/KDscion-p34-sleeveless maxi dress.png',
      '37': 'images/KDscion-p37-sleeveless-shift dress.png',
      '40': 'images/KDscion-p40-sleeveless bodycon dress.png',
      '48': 'images/KDscion-p48-full sleeve wrap top.png',
      '49': 'images/KDscion-p49-sleeveless A-line dress.png',
      '57': 'images/KDscion-p57-full sleeve A-line dress.png',
      '62': 'images/KDscion-p62-full sleeve quarter button A-line dress.png',
    };

    function getDesignImage(sku) {
      if (!sku) return null;
      const m = sku.match(/KD-P(\d+)-/i) || sku.match(/P(\d+)/i);
      if (!m) return null;
      return DESIGN_IMAGES[m[1]] || null;
    }

    // ── Fabric image map ──────────────────────────────────────────────────────
    function getFabricImage(fabricId) {
      if (!fabricId) return null;
      const id = fabricId.toLowerCase();
      if (id.includes('cotton-linen') || id.includes('cotton_linen')) return 'images/cotton-linen blend-1.webp';
      if (id.includes('cotton-wool') || id.includes('wool-blend') || id.includes('wool_blend')) return 'images/wool-blend-2.avif';
      if (id.includes('cotton')) return 'images/cotton-1.jpg';
      if (id.includes('linen')) return 'images/linen-1.jpg';
      if (id.includes('wool')) return 'images/wool-1.jpg';
      return null;
    }

    function fabricTypeFromId(id) {
      if (!id) return '';
      const i = id.toLowerCase();
      if (i.includes('cotton-linen') || i.includes('cotton_linen')) return 'Cotton-Linen Blend';
      if (i.includes('cotton-wool') || i.includes('wool-blend')) return 'Cotton-Wool Blend';
      if (i.includes('cotton')) return 'Cotton';
      if (i.includes('linen')) return 'Linen';
      if (i.includes('wool')) return 'Wool';
      return id;

    // ── Measurement groups ────────────────────────────────────────────────────
    const MEAS_GROUPS = [
      {
        title: 'General',
        fields: [
          { key: 'height', label: 'Height', unit: 'cm' },
          { key: 'weight', label: 'Weight', unit: 'kg' },

        fields: [

      {
        title: 'Lower Body',
        fields: [
          { key: 'inseam',       label: 'Inseam',      unit: 'cm' },
          { key: 'outseam',      label: 'Outseam',     unit: 'cm' },
          { key: 'knee',         label: 'Knee',        unit: 'cm' },
          { key: 'calf',         label: 'Calf',        unit: 'cm' },
          { key: 'ankle',        label: 'Ankle',       unit: 'cm' },
          { key: 'waisttoankle', label: 'Waist–Ankle', unit: 'cm' },
        ],
      },
    ];

    function buildMeasHtml(meas) {
      if (!meas || Object.keys(meas).length === 0) {
        return `<p class="meas-none">No measurements on file for this customer.</p>`;
      }
      const cols = [MEAS_GROUPS.slice(0, 2), MEAS_GROUPS.slice(2)];
      let html = `<div class="meas-groups">`;
      cols.forEach(groups => {
        html += `<div>`;
        groups.forEach(group => {
          const rows = group.fields.filter(f => meas[f.key] != null);
          if (!rows.length) return;
          html += `<div class="meas-group"><p class="meas-group-title">${group.title}</p>`;
          rows.forEach(f => {
            html += `<div class="meas-row">
              <span class="meas-key">${f.label}</span>
              <span class="meas-val">${meas[f.key]} ${f.unit}</span>
            </div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
      return html;
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmt(n) { return `$${Number(n).toLocaleString()}`; }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function addrStr(a) {
      if (!a) return '—';
      return [a.line1, a.line2, a.city, a.state, a.postalCode, a.country].filter(Boolean).join(', ');
    }

    function imgOrPlaceholder(src, alt, cssClass) {
      if (src) {
        return `<img src="${src}" alt="${alt}" class="${cssClass}" loading="lazy">`;
      }
      return `<div class="df-placeholder">✦</div>`;
    }

    // ── Build mailto: link ────────────────────────────────────────────────────
    function buildMailto(order, items, meas) {
      const orderId  = order.id ?? '—';
      const dateStr  = fmtDate(order.createdAt);
      const custName = [order.user?.firstName, order.user?.lastName].filter(Boolean).join(' ') || order.customer?.name || '—';
      const custEmail = order.user?.email || order.customer?.email || '—';
      const addr     = addrStr(order.shippingAddress);
      const total    = items.reduce((s, i) => s + Number(i.unitPrice ?? 0) * (i.quantity ?? 1), 0);

      let body = `KING DHORAJIYA — WORKSHOP ORDER BRIEF\n`;
      body += `${'='.repeat(50)}\n\n`;
      body += `ORDER #: ${orderId}\n`;
      body += `DATE: ${dateStr}\n\n`;

      body += `CUSTOMER\n${'-'.repeat(30)}\n`;
      body += `Name: ${custName}\n`;
      body += `Email: ${custEmail}\n`;
      body += `Delivery Address: ${addr}\n`;
      if (order.notes) body += `Notes: ${order.notes}\n`;
      body += `\n`;

      items.forEach((item, idx) => {
        const name       = item.displayName ?? item.product?.name ?? 'Bespoke Garment';
        const sku        = item.product?.sku ?? item.product?.id ?? '—';
        const selections = item.configuratorSession?.selections ?? {};
        const selValues  = Object.values(selections);
        const fabricVal  = selValues[0] ?? null;
        const fabricName = fabricVal?.label ?? '—';
        const fabricId   = fabricVal?.id ?? '—';
        const fabricType = fabricTypeFromId(fabricId);
        const price      = Number(item.unitPrice ?? 0) * (item.quantity ?? 1);

        body += `GARMENT ${idx + 1}: ${name}\n${'-'.repeat(30)}\n`;
        body += `Design #: ${sku}\n`;
        body += `Design Name: ${name}\n`;
        body += `Fabric #: ${fabricId}\n`;
        body += `Fabric Name: ${fabricName}\n`;
        body += `Fabric Type: ${fabricType}\n`;
        body += `Price: ${fmt(price)}\n`;
        if ((item.quantity ?? 1) > 1) body += `Qty: ${item.quantity}\n`;
        body += `\n`;
      });

      body += `ORDER TOTAL: ${fmt(total)}\n\n`;

      body += `MEASUREMENTS\n${'-'.repeat(30)}\n`;
      const m = meas?.measurements ?? meas;
      if (m && Object.keys(m).length > 0) {
        MEAS_GROUPS.forEach(group => {
          const rows = group.fields.filter(f => m[f.key] != null);
          if (!rows.length) return;
          body += `${group.title}:\n`;
          rows.forEach(f => { body += `  ${f.label}: ${m[f.key]} ${f.unit}\n`; });
        });
      } else {
        body += `No measurements on file.\n`;
      }

      body += `\n${'='.repeat(50)}\n`;
      body += `Crafted by King Dhorajiya — The House of Scion\n`;

      const subject = `Workshop Order Brief #${orderId} — ${items[0] ? (items[0].displayName ?? items[0].product?.name ?? 'Bespoke Garment') : 'Order'}`;

      return `mailto:${WORKSHOP_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    // ── Render one order card ─────────────────────────────────────────────────
    function renderOrderCard(order, meas) {
      const items   = order.items ?? order.cartItems ?? [];
      const total   = items.reduce((s, i) => s + Number(i.unitPrice ?? 0) * (i.quantity ?? 1), 0);
      const orderId = order.id ?? '—';
      const dateStr = fmtDate(order.createdAt);
      const addr    = order.shippingAddress;
      const custName  = [order.user?.firstName, order.user?.lastName].filter(Boolean).join(' ') || order.customer?.name || '—';
      const custEmail = order.user?.email || order.customer?.email || '—';
      const status    = (order.status ?? 'pending').toLowerCase();
      const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
      const statusClass = (status === 'paid' || status === 'completed' || status === 'confirmed') ? '' : 'status-pending';

      // Build items HTML
      let itemsHtml = '';
      items.forEach(item => {
        const name       = item.displayName ?? item.product?.name ?? 'Bespoke Garment';
        const sku        = item.product?.sku ?? item.product?.id ?? '';
        const selections = item.configuratorSession?.selections ?? {};
        const selValues  = Object.values(selections);
        const fabricVal  = selValues[0] ?? null;
        const fabricName = fabricVal?.label ?? '—';
        const fabricId   = fabricVal?.id ?? '';
        const fabricType = fabricTypeFromId(fabricId);
        const price      = Number(item.unitPrice ?? 0) * (item.quantity ?? 1);

        const designImg  = getDesignImage(sku);
        const fabricImg  = getFabricImage(fabricId);

        itemsHtml += `
          <div style="margin-bottom:2rem; padding-bottom:2rem; border-bottom:1px solid #f0f0f0;">
            <div class="order-top-cols">
              <!-- Design -->
              <div>
                <p class="section-label">Design</p>
                <div class="design-fabric-block">
                  ${imgOrPlaceholder(designImg, name, 'df-image')}
                  <div class="df-details">
                    <p class="df-name">${name}</p>
                    ${sku ? `<div class="df-row"><span class="df-key">Ref</span><span class="df-val">${sku}</span></div>` : ''}
                    ${(item.quantity ?? 1) > 1 ? `<div class="df-row"><span class="df-key">Qty</span><span class="df-val plain">${item.quantity}</span></div>` : ''}
                    <div class="df-row" style="margin-top:0.5rem">
                      <span class="df-key">Price</span><span class="df-val plain">${fmt(price)}</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Fabric -->
              <div>
                <p class="section-label">Fabric</p>
                <div class="design-fabric-block">
                  ${imgOrPlaceholder(fabricImg, fabricName, 'df-image')}
                  <div class="df-details">
                    <p class="df-name">${fabricName !== '—' ? fabricName : 'Not specified'}</p>
                    ${fabricId ? `<div class="df-row"><span class="df-key">Ref</span><span class="df-val">${fabricId}</span></div>` : ''}
                    ${fabricType ? `<div class="df-row"><span class="df-key">Type</span><span class="df-val plain">${fabricType}</span></div>` : ''}
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      });

      if (!itemsHtml) {
        itemsHtml = `<p class="meas-none">No garment items found.</p>`;
      }

      // Measurements
      const measData = meas?.measurements ?? meas ?? {};
      const measHtml = buildMeasHtml(measData);

      // Notes
      const notesHtml = order.notes
        ? `<hr class="meas-divider">
           <p class="section-label">Notes</p>
           <p class="notes-text">${order.notes}</p>`
        : '';

      // Mailto
      const mailtoHref = buildMailto(order, items, meas);

      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <!-- Card header -->
        <div class="order-card-header">
          <div>
            <p class="order-card-id">Order # ${orderId}</p>
            ${dateStr ? `<p class="order-card-date">${dateStr}</p>` : ''}
          </div>
          <div style="display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;">
            <span class="order-card-status ${statusClass}">${statusLabel}</span>
            <a href="${mailtoHref}" class="order-email-btn">
              ✉ Email to Workshop
            </a>
          </div>
        </div>

        <!-- Card body -->
        <div class="order-card-body">

          <!-- Garments (design + fabric) -->
          ${itemsHtml}

          <!-- Customer + Delivery -->
          <div class="order-top-cols" style="margin-bottom:1.6rem;">
            <div>
              <p class="section-label">Customer</p>
              <div class="customer-block">
                ${custName !== '—' ? `<div><span class="cust-label">Name</span><br>${custName}</div>` : ''}
                ${custEmail !== '—' ? `<div><span class="cust-label">Email</span><br>${custEmail}</div>` : ''}
              </div>
            </div>
            <div>
              <p class="section-label">Delivery Address</p>
              <div class="customer-block">
                ${addr ? addrStr(addr).split(', ').map(l => `<div>${l}</div>`).join('') : '<div style="color:#bbb">—</div>'}
              </div>
            </div>
          </div>

          <!-- Measurements -->
          <hr class="meas-divider">
          <p class="section-label">Measurements on File</p>
          <div class="meas-section">${measHtml}</div>

          ${notesHtml}

          <!-- Total -->
          <div class="order-price-row">
            <span class="price-label">Order Total</span>
            <span class="price-amount">${fmt(total)}</span>
          </div>
        </div>
      `;

      return card;
    }

    // ── Load all orders ───────────────────────────────────────────────────────
    window.loadOrders = async function loadOrders() {
      const container = document.getElementById('orders-container');
      container.innerHTML = `<p class="dash-loading" id="dash-loading">Loading orders…</p>`;
      document.getElementById('order-count').textContent = '—';

      try {
        const raw    = await getOrders();
        const orders = Array.isArray(raw) ? raw : (raw?.data ?? raw?.orders ?? []);

        document.getElementById('order-count').textContent =
          `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

        if (!orders.length) {
          container.innerHTML = `<div class="dash-empty">No orders yet.</div>`;
          return;
        }

        // Summary stats
        const totalRevenue = orders.reduce((sum, o) => {
          const items = o.items ?? o.cartItems ?? [];
          return sum + items.reduce((s, i) => s + Number(i.unitPrice ?? 0) * (i.quantity ?? 1), 0);
        }, 0);
        document.getElementById('stat-total').textContent = orders.length;
        document.getElementById('stat-revenue').textContent = `$${totalRevenue.toLocaleString()}`;
        document.getElementById('dash-summary').style.display = 'flex';

        // Fetch measurements once (logged-in user's measurements)
        let meas = null;
        try { meas = await getMeasurements(); } catch (_) {}

        container.innerHTML = '';

        // Sort newest first
        const sorted = [...orders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        sorted.forEach(order => {
          const card = renderOrderCard(order, meas);
          container.appendChild(card);
        });

      } catch (err) {
        container.innerHTML = `<p class="dash-error">${err.message ?? 'Failed to load orders.'}</p>`;
      }
    };

    loadOrders();
  </script>

</body>
</html>
